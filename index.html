<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CATLingo - Cròniques de Catalunya</title>
<meta name="description" content="RPG per aprendre català jugant">
<meta name="theme-color" content="#C8102E">
<link rel="manifest" href="/manifest.json">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #fff; padding-bottom: 80px; }
.header { background: linear-gradient(135deg, #FFD700 0%, #C8102E 100%); padding: 20px; text-align: center; border-bottom: 2px solid #6B4F3A; }
.header h1 { font-size: 22px; margin-bottom: 5px; color: #0a0a0f; font-weight: 800; }
.coins { font-size: 18px; font-weight: bold; color: #0a0a0f; }
.stats { font-size: 12px; color: #0a0a0f; margin-top: 5px; }
.tab-content { display: none; padding: 20px; }
.tab-content.active { display: block; }
.tabs { display: flex; background: #1a1a24; position: fixed; bottom: 0; left: 0; width: 100%; border-top: 1px solid #333; z-index: 1000; }
.tab-btn { flex: 1; padding: 12px; background: none; border: none; color: #888; font-size: 12px; cursor: pointer; }
.tab-btn.active { color: #FFD700; background: rgba(255, 215, 0, 0.1); border-top: 2px solid #FFD700; }
.card { background: #1a1a24; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #2a2a35; }
.btn { background: linear-gradient(135deg, #C8102E 0%, #A60A24 100%); color: #fff; border: 1px solid #FFD700; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
.btn-sec { background: #2a2a35; border: 1px solid #555; }
.opcio { background: #2a2a35; padding: 15px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; }
.opcio:hover { background: #3a3a45; }
.capitol-card { background: linear-gradient(135deg, #1a1a24 0%, #2a2a35 100%); border: 2px solid #C8102E; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
.capitol-card.completat { border-color: #4CAF50; }
.capitol-card.bloquejat { opacity: 0.5; }
.capitol-icona { font-size: 48px; text-align: center; margin-bottom: 10px; }
.npc-box { background: #2a2a35; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #FFD700; }
.npc-nom { color: #FFD700; font-weight: bold; margin-bottom: 5px; }
.gremi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
.gremi-item { background: #1a1a24; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #2a2a35; }
.sub-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
.sub-tab-btn { flex: 1; padding: 10px; background: #1a1a24; border: 1px solid #2a2a35; color: #888; border-radius: 8px; cursor: pointer; }
.sub-tab-btn.active { background: #FFD700; color: #0a0a0f; font-weight: bold; }
.completion-screen { text-align: center; padding: 40px 20px; }
.completion-screen h2 { font-size: 28px; color: #4CAF50; margin-bottom: 15px; }
.completion-screen p { font-size: 16px; color: #ccc; margin-bottom: 25px; }
.completion-buttons { display: flex; gap: 10px; }
</style>
</head>
<body>

<div class="header">
  <h1 id="app-titol">🏴 CATLingo</h1>
  <div class="coins" id="coins">🪙 0 <span id="text-monedes">Monedes</span></div>
  <div class="stats" id="stats"></div>
</div>

<div id="tab-mapa" class="tab-content active">
  <h2 id="text-mon">🗺️ Mapa de Catalunya</h2>
  <div id="mapa-contenidor"></div>
</div>

<div id="tab-missio" class="tab-content">
  <div id="npc-box" class="npc-box" style="display:none;">
    <div class="npc-nom" id="npc-nom"></div>
    <div id="npc-text"></div>
  </div>
  <div class="card" id="missio-card">
    <h3 id="missio-titol">Selecciona una missió al mapa</h3>
    <div id="missio-escenari"></div>
    <div id="missio-opcions"></div>
    <div id="missio-feedback" style="text-align:center; margin:15px 0; font-weight:bold;"></div>
  </div>
</div>

<div id="tab-gremi" class="tab-content">
  <div class="sub-tabs">
    <button class="sub-tab-btn active" onclick="mostrarGremi('personatges', event)">👥 Personatges</button>
    <button class="sub-tab-btn" onclick="mostrarGremi('objectes', event)">🎒 Objectes</button>
    <button class="sub-tab-btn" onclick="mostrarGremi('llegendes', event)">📜 Llegendes</button>
  </div>
  <div id="gremi-contenidor" class="gremi-grid"></div>
</div>

<div id="tab-botiga" class="tab-content">
  <div class="card">
    <h3 id="text-botiga">🛒 Botiga</h3>
    <div id="botiga-contenidor" class="gremi-grid"></div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="canviarTab('mapa', event)">🗺️ <span id="tab-mapa-txt">Món</span></button>
  <button class="tab-btn" onclick="canviarTab('missio', event)">📜 <span id="tab-missio-txt">Missió</span></button>
  <button class="tab-btn" onclick="canviarTab('gremi', event)">🏛️ <span id="tab-gremi-txt">Gremi</span></button>
  <button class="tab-btn" onclick="canviarTab('botiga', event)">🛒 <span id="tab-botiga-txt">Botiga</span></button>
</div>

<script>
const LANGS = {
  es: { app_titol: "CATLingo - Crónicas de Cataluña", monedes: "Monedas", tab_mapa: "Mundo", tab_missio: "Misión", tab_gremi: "Gremio", tab_botiga: "Tienda", text_mon: "🗺️ Mapa de Cataluña", text_botiga: "🛒 Tienda", entrar: "Entrar", bloquejat: "Bloqueado", completat: "Completado", repetir: "Repetir", volver_mapa: "Volver al mapa", mision_completada: "¡Misión completada!", repas_rapido: "Repàs Ràpid", repas_titulo: "Repàs Ràpid - 5 Preguntas" },
  ca: { app_titol: "CATLingo - Cròniques de Catalunya", monedes: "Monedes", tab_mapa: "Món", tab_missio: "Missió", tab_gremi: "Gremi", tab_botiga: "Botiga", text_mon: "🗺️ Mapa de Catalunya", text_botiga: "🛒 Botiga", entrar: "Entrar", bloquejat: "Bloquejat", completat: "Completat", repetir: "Repetir", volver_mapa: "Tornar al mapa", mision_completada: "Missió completada!", repas_rapido: "Repàs Ràpid", repas_titulo: "Repàs Ràpid - 5 Preguntes" }
};

let idioma = localStorage.getItem('cat_idioma') || 'es';
let LANG = LANGS[idioma];

let estat = {
  monedes: parseInt(localStorage.getItem('cat_monedes')) || 0,
  capitolsCompletats: JSON.parse(localStorage.getItem('cat_completats')) || [],
  objectes: JSON.parse(localStorage.getItem('cat_objectes')) || [],
  seny: parseInt(localStorage.getItem('cat_seny')) || 0,
  rauxa: parseInt(localStorage.getItem('cat_rauxa')) || 0,
  capitolActual: null,
  pasActual: 0,
  fallades: JSON.parse(localStorage.getItem('cat_fallades')) || []
};

const CAPITOLS = [
  { id: "bcn_01", nom: "Barcelona - La primera nit al Born", icona: "🏙️", desbloquejat: true, desc: "Arribes a Barcelona sense saber ni un 'bon dia'.", premi: {id:"paraula_seny", emoji:"⚖️", nom:"Seny"}, archivo: "capitol_01_barcelona" },
  { id: "gir_01", nom: "Girona - El Barri Jueu", icona: "🏰", desbloquejat: false, desc: "Carrers estrets. Català més ràpid. T'hauràs de guanyar la confiança.", premi: {id:"paraula_rauxa", emoji:"🔥", nom:"Rauxa"}, archivo: "capitol_02_girona", requereix: "bcn_01" },
  { id: "tar_01", nom: "Tarragona - L'Amfiteatre", icona: "🏛️", desbloquejat: false, desc: "Història romana. Passat i condicional.", premi: {id:"paraula_historia", emoji:"📜", nom:"Memòria"}, archivo: "capitol_03_tarragona", requereix: "gir_01" },
  { id: "lle_01", nom: "Lleida - La Segarra", icona: "🌾", desbloquejat: false, desc: "Camp i pobles. Català rural i expressions de pagès.", premi: {id:"paraula_terra", emoji:"🌱", nom:"Terra"}, archivo: "capitol_04_lleida", requereix: "tar_01" },
  { id: "vic_01", nom: "Vic - El Mercat Medieval", icona: "🏪", desbloquejat: false, desc: "Comerç i regateig. Subjuntiu i imperatiu.", premi: {id:"paraula_comerc", emoji:"💰", nom:"Comerç"}, archivo: "capitol_05_vic", requereix: "lle_01" },
  
  { id: "tar_02", nom: "Tarragona - El Mercat Central", icona: "🐟", desbloquejat: false, desc: "Pretèrit imperfet vs perfet.", premi: {id:"paraula_temps", emoji:"⏳", nom:"Temps"}, archivo: "capitol_06_tarragona", requereix: "tar_01" },
  { id: "gir_02", nom: "Girona - Les Muralles", icona: "🧱", desbloquejat: false, desc: "Relatius: que, qui, on, quan.", premi: {id:"paraula_relatiu", emoji:"🔗", nom:"Relatiu"}, archivo: "capitol_07_girona", requereix: "gir_01" },
  { id: "bcn_02", nom: "Barcelona - El Raval", icona: "🌆", desbloquejat: false, desc: "Pronoms febles.", premi: {id:"paraula_pronom", emoji:"👤", nom:"Pronom"}, archivo: "capitol_08_barcelona", requereix: "bcn_01" },
  { id: "lle_02", nom: "Lleida - La Fruita", icona: "🍎", desbloquejat: false, desc: "Condicionals i si.", premi: {id:"paraula_si", emoji:"❓", nom:"Si"}, archivo: "capitol_09_lleida", requereix: "lle_01" },
  { id: "vic_02", nom: "Vic - La Catedral", icona: "⛪", desbloquejat: false, desc: "Passiva i impersonal.", premi: {id:"paraula_passiva", emoji:"🏛️", nom:"Passiva"}, archivo: "capitol_10_vic", requereix: "vic_01" }
]

const BOTIGA_ITEMS = [
  {id:"casteller", emoji:"👥", nom:"Casteller", preu:100},
  {id:"sardana", emoji:"💃", nom:"Sardana", preu:80},
  {id:"gegant", emoji:"🎭", nom:"Gegant", preu:120}
];

// B. Seny/Rauxa afectan el diálogo
function aplicarCondicionesSenyRauxa(pas, capitolId) {
  const pasMod = JSON.parse(JSON.stringify(pas));

  if (capitolId === 'vic_01' && pasMod.npc.id === 'vell' && estat.seny > 70) {
    pasMod.npc.frase = "A veure, tranquil... te ho dic a poc a poc: No compri res sense regatejar abans.";
    pasMod.pistaExtra = "Pista: 'No compri' va amb subjuntiu per consell.";
  }

  if (capitolId === 'gir_01' && pasMod.npc.id === 'chaval' && estat.rauxa > 70) {
    pasMod.npc.frase = "Ostres tiu, vine per aquí que t'ensenyo un lloc flipant!";
    pasMod.escenari = "El chaval et porta a un carreró secret. Desbloquejas 'Carrer Amagat'.";
  }

  return pasMod;
}

function aplicarIdioma() {
  document.getElementById('app-titol').textContent = LANG.app_titol;
  document.getElementById('text-monedes').textContent = LANG.monedes;
  document.getElementById('tab-mapa-txt').textContent = LANG.tab_mapa;
  document.getElementById('tab-missio-txt').textContent = LANG.tab_missio;
  document.getElementById('tab-gremi-txt').textContent = LANG.tab_gremi;
  document.getElementById('tab-botiga-txt').textContent = LANG.tab_botiga;
  document.getElementById('text-mon').textContent = LANG.text_mon;
  document.getElementById('text-botiga').textContent = LANG.text_botiga;
}

function canviarTab(tab, e) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(e) e.target.closest('.tab-btn').classList.add('active');
  if(tab === 'mapa') carregarMapa();
  if(tab === 'gremi') mostrarGremi('personatges', e);
  if(tab === 'botiga') carregarBotiga();
  if(tab === 'missio') carregarMissioTab();
}

async function carregarCapitol(nombreArchivo) {
  try {
    const res = await fetch(`./data/${nombreArchivo}.json`);
    if (!res.ok) throw new Error('Archivo no encontrado');
    
    estat.capitolActual = await res.json();
    estat.pasActual = 0;
    
    canviarTab('missio', {target: {closest: () => document.querySelector('.tab-btn:nth-child(2)')}});
    
    // Dale 50ms para que el DOM se renderice
    setTimeout(() => carregarPas(), 50);
    
  } catch(e) {
    alert('Error carregant capítol: ' + e.message);
  }
}

function carregarMapa() {
  const cont = document.getElementById('mapa-contenidor');
  cont.innerHTML = '';

  CAPITOLS.forEach(capitol => {
    const completat = estat.capitolsCompletats.includes(capitol.id);
    let desbloquejat = capitol.desbloquejat;
    if (capitol.requereix) {
      desbloquejat = estat.capitolsCompletats.includes(capitol.requereix);
    }

    const div = document.createElement('div');
    div.className = 'capitol-card' + (completat? ' completat' : '') + (!desbloquejat? ' bloquejat' : '');
    div.innerHTML = `
      <div class="capitol-icona">${capitol.icona}</div>
      <h3>${capitol.nom}</h3>
      <p>${capitol.desc}</p>
      ${completat? `✓ ${LANG.completat} <button class="btn btn-sec" style="margin-top:10px;" onclick="repetirCapitol('${capitol.id}'); event.stopPropagation()">${LANG.repetir}</button>` : ''}
      ${desbloquejat &&!completat? `<button class="btn" onclick="entrarCapitol('${capitol.id}')">${LANG.entrar}</button>` : ''}
      ${!desbloquejat? `<p style="color:#888; margin-top:10px;">${LANG.bloquejat}</p>` : ''}
    `;
    cont.appendChild(div);
  });
}

function entrarCapitol(id) {
  const capitol = CAPITOLS.find(c => c.id === id);
  if (capitol && capitol.archivo) carregarCapitol(capitol.archivo);
}

function repetirCapitol(id) {
  const capitol = CAPITOLS.find(c => c.id === id);
  if (!capitol) return;
  if(confirm(idioma === 'ca'? 'Vols repetir aquesta missió?' : '¿Quieres repetir esta misión?')) {
    estat.capitolsCompletats = estat.capitolsCompletats.filter(c => c!== id);
    guardarEstat();
    carregarCapitol(capitol.archivo);
  }
}

function carregarPas() {
  if (!estat.capitolActual) return;
  const pas = estat.capitolActual.passos[estat.pasActual];
  if (!pas) { completarCapitol(); return; }

  const pasMod = aplicarCondicionesSenyRauxa(pas, estat.capitolActual.id);

  document.getElementById('npc-box').style.display = 'block';
  document.getElementById('npc-nom').textContent = pasMod.npc.nom;
  document.getElementById('npc-text').innerHTML = `${pasMod.npc.frase} <span style="cursor:pointer; margin-left:8px;" onclick="parlar('${pasMod.npc.frase.replace(/'/g, "\\'")}')">🔊</span>`;
  document.getElementById('missio-titol').textContent = pasMod.pregunta;
  document.getElementById('missio-escenari').textContent = pasMod.escenari;

  if (pasMod.pistaExtra) {
    document.getElementById('missio-escenari').innerHTML += `<div style="margin-top:10px; color:#FFD700; font-size:14px;">${pasMod.pistaExtra}</div>`;
  }

  const opcionsDiv = document.getElementById('missio-opcions');
  opcionsDiv.innerHTML = '';
  pasMod.opcions.forEach((opcio, i) => {
    const div = document.createElement('div');
    div.className = 'opcio';
    div.textContent = opcio.text;
    div.onclick = () => seleccionarOpcio(i);
    opcionsDiv.appendChild(div);
  });
  document.getElementById('missio-feedback').textContent = '';
}

// D. Web Speech API
function parlar(text) {
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ca-ES';
    utter.rate = 0.9;
    speechSynthesis.speak(utter);
  }
}

function seleccionarOpcio(idx) {
  const pas = estat.capitolActual.passos[estat.pasActual];
  const opcio = pas.opcions[idx];
  const feedback = idioma === 'ca'? opcio.feedback_ca : opcio.feedback_es;
  document.getElementById('missio-feedback').textContent = feedback;

  if (opcio.correcte) {
    estat.monedes += opcio.coins || 0;
    estat.seny += opcio.seny || 0;
    estat.rauxa += opcio.rauxa || 0;
  } else {
    estat.fallades.push(pas);
  }

  guardarEstat();
  actualitzarUI();

  setTimeout(() => {
    estat.pasActual++;
    carregarPas();
  }, 1500);
}

function completarCapitol() {
  if (!estat.capitolsCompletats.includes(estat.capitolActual.id)) {
    estat.capitolsCompletats.push(estat.capitolActual.id);
  }

  document.getElementById('npc-box').style.display = 'none';
  document.getElementById('missio-card').innerHTML = `
    <div class="completion-screen">
      <h2>✅ ${LANG.mision_completada}</h2>
      <p>${estat.capitolActual.premi.emoji} ${estat.capitolActual.premi.nom}</p>
      <div class="completion-buttons">
        <button class="btn btn-sec" onclick="tornarMapa()">${LANG.volver_mapa}</button>
        <button class="btn" onclick="repetirCapitolActual()">${LANG.repetir}</button>
      </div>
    </div>
  `;

  guardarEstat();
  carregarMapa();
}

function repetirCapitolActual() {
  if (!estat.capitolActual) return;
  repetirCapitol(estat.capitolActual.id);
}

function tornarMapa() {
  document.getElementById('npc-box').style.display = 'none';
  document.getElementById('missio-titol').textContent = 'Selecciona una missió al mapa';
  document.getElementById('missio-escenari').textContent = '';
  document.getElementById('missio-opcions').innerHTML = '';
  document.getElementById('missio-feedback').textContent = '';
  document.getElementById('missio-card').innerHTML = `
    <h3 id="missio-titol">Selecciona una missió al mapa</h3>
    <div id="missio-escenari"></div>
    <div id="missio-opcions"></div>
    <div id="missio-feedback" style="text-align:center; margin:15px 0; font-weight:bold;"></div>
  `;
  canviarTab('mapa');
}

// C. Modo Repàs
function carregarMissioTab() {
  if (!estat.capitolActual) {
    document.getElementById('missio-card').innerHTML = `
      <button class="btn" onclick="iniciarRepas()">${LANG.repas_rapido}</button>
      <h3 style="margin-top:20px;">${LANG.repas_titulo}</h3>
      <div id="repas-contenidor"></div>
    `;
  }
}

function iniciarRepas() {
  let todasPreguntas = [];
  let capitolsCargados = 0;

  if (estat.capitolsCompletats.length === 0 && estat.fallades.length === 0) {
    document.getElementById('repas-contenidor').innerHTML = '<p style="text-align:center; color:#888;">Completa un capítol primer</p>';
    return;
  }

  estat.capitolsCompletats.forEach(id => {
    const capitol = CAPITOLS.find(c => c.id === id);
    if (capitol && capitol.archivo) {
      fetch(`./data/${capitol.archivo}.json`)
      .then(r => r.json())
      .then(data => {
        todasPreguntas = todasPreguntas.concat(data.passos);
        capitolsCargados++;
        if (capitolsCargados === estat.capitolsCompletats.length) {
          todasPreguntas = [...todasPreguntas, ...estat.fallades, ...estat.fallades];
          mostrarRepas(todasPreguntas);
        }
      });
    }
  }); // <-- cierre del forEach

  if (estat.capitolsCompletats.length === 0) { // <-- esto va aquí dentro
    todasPreguntas = [...estat.fallades,...estat.fallades];
    mostrarRepas(todasPreguntas);
  }
} // <-- cierre de la función

function mostrarRepas(preguntas) {
  const cont = document.getElementById('repas-contenidor');
  if (!cont) return;

  const repas = preguntas.sort(() => 0.5 - Math.random()).slice(0, 5);
  cont.innerHTML = '';

  repas.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<p><strong>${i+1}.</strong> ${p.pregunta}</p><p style="color:#888; font-size:14px;">${p.escenari}</p>`;
    cont.appendChild(div);
  });
}

function guardarEstat() {
  localStorage.setItem('cat_monedes', estat.monedes);
  localStorage.setItem('cat_completats', JSON.stringify(estat.capitolsCompletats));
  localStorage.setItem('cat_objectes', JSON.stringify(estat.objectes));
  localStorage.setItem('cat_seny', estat.seny);
  localStorage.setItem('cat_rauxa', estat.rauxa);
  localStorage.setItem('cat_fallades', JSON.stringify(estat.fallades));
}

function actualitzarUI() {
  document.getElementById('coins').innerHTML = `🪙 ${estat.monedes} <span id="text-monedes">${LANG.monedes}</span>`;
  document.getElementById('stats').textContent = `Seny: ${estat.seny} | Rauxa: ${estat.rauxa}`;
}

function mostrarGremi(tab, e) {
  document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
  if(e) e.target.classList.add('active');
  document.getElementById('gremi-contenidor').innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#888;">Pròximament</div>`;
}

function carregarBotiga() {
  const cont = document.getElementById('botiga-contenidor');
  cont.innerHTML = '';
  BOTIGA_ITEMS.forEach(item => {
    const div = document.createElement('div');
    div.className = 'gremi-item';
    div.innerHTML = `
      <div style="font-size:32px;">${item.emoji}</div>
      <div>${item.nom}</div>
      <div style="color:#FFD700;">${item.preu} 🪙</div>
      <button class="btn" onclick="comprar('${item.id}', ${item.preu})">Comprar</button>
    `;
    cont.appendChild(div);
  });
}

function comprar(id, preu) {
  if (estat.monedes < preu) { alert('No tens prou monedes'); return; }
  estat.monedes -= preu;
  estat.objectes.push(id);
  guardarEstat();
  actualitzarUI();
  alert('Comprat!');
}

aplicarIdioma();
actualitzarUI();
carregarMapa();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW error:', err));
}
</script>
